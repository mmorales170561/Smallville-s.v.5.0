name: Daily Planet Keep-Alive

on:
  schedule:
    # This runs the "paperboy" every day at 12:00 PM UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to run it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Daily Planet Dashboard
        run: |
          # Replace the URL below with your actual Streamlit App URL
          curl -I https://your-app-name.streamlit.app
